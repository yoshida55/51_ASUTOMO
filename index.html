<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作業 アストモスグループ物流会社 採用サイト</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/work.css" />
  </head>
  <body>
    <!-- ===============================================
     ヘッダー
     =============================================== -->
    <header class="header_area">
      <div class="header_logo">
        <a href="#"><img src="img/logo_bk.png" alt="ASUTOMO GROUP" /></a>
      </div>
      <nav class="header_nav">
        <a class="header_nav_item" href="#">
          <span class="header_text" data-text="会社を知る">会社を知る</span>
        </a>
        <a class="header_nav_item" href="#">
          <span class="header_text" data-text="人を知る">人を知る</span>
        </a>
        <a class="header_nav_item" href="#">
          <span class="header_text" data-text="働く環境を知る">働く環境を知る</span>
        </a>
        <a class="header_nav_item" href="#">
          <span class="header_text" data-text="採用情報">採用情報</span>
        </a>
      </nav>

      <div class="header_buttons">
        <a class="header_button color1" href="#">募集要項</a>
        <a class="header_button color2" href="#">エントリー</a>
      </div>
    </header>

    <!-- ===============================================
     メインビジュアル
     =============================================== -->
    <!-- メインビジュアル全体（背景+テキストを重ねる） -->
    <section class="mainvisual_area">
      <!-- スライド背景コンテナ -->
      <div class="mainvisual_bg">
        <!-- スライド背景1枚（アニメーション切替用） -->
        <div class="mainvisual_slide mainvisual_slide1"></div>
        <div class="mainvisual_slide mainvisual_slide2"></div>
        <div class="mainvisual_slide mainvisual_slide3"></div>
      </div>
      <!-- テキストコンテナ -->
      <div class="mainvisual_content">
        <img class="mainvisual_title" src="img/copy_bl.svg" alt="ASUTOMO GROUP" />
        <p class="mainvisual_sub_title title_position1">明日を灯す。</p>
        <p class="mainvisual_sub_title title_position2">その情熱を燃やせ。</p>
      </div>

      <!-- タイトル上に動画を配置（PCのみ表示） -->
      <video class="mainvisual_video" autoplay muted loop playsinline>
        <source src="img/move/アストモスグループ物流会社 採用サイト.mp4" type="video/mp4" />
      </video>
    </section>

    <!-- ===============================================➂
     メッセージ
     =============================================== -->
    <section class="message_area">
      <!-- 背景（高さの基準） -->
      <div class="message_white_color">
        <div class="message_background">
          <div class="message_content">
            <p class="message_text">人々の明日を支える使命感</p>
            <p class="message_text">積み上げてきた確かな信頼</p>
            <p class="message_text">それに燃ける情熱が、明日を灯す。</p>
            <img class="message_catchcopy" src="img/top/message_txt_01.png" alt="ただの運ぶを超えていけ。届けるは明日を灯すエネルギー。" />
          </div>
        </div>
      </div>
      <!-- 白い半円形の帯 -->
      <div class="message_white_circle"></div>

      <!-- 写真コンテナ（sectionに重なる） -->
      <div class="message_photos">
        <img class="message_photo_img photo1" src="img/top/message_img_01.jpg" alt="社員のイメージ" />
        <img class="message_photo_img photo2" src="img/top/message_img_02.jpg" alt="社員のイメージ" />
        <img class="message_photo_img photo3" src="img/top/message_img_03.jpg" alt="社員のイメージ" />
        <img class="message_photo_img photo4" src="img/top/message_img_04.jpg" alt="社員のイメージ" />
        <img class="message_photo_img photo5" src="img/top/message_img_05.jpg" alt="社員のイメージ" />
      </div>
    </section>

    <!-- ===============================================
     会社を知る
     =============================================== -->
    <section class="company_area">
      <h2 class="company_title">Company<span class="company_sub_title">会社を知る</span></h2>
      <p class="company_msg">明日を灯す。未来を届ける。</p>

      <!-- フレックスで画像を左右に配置する -->
      <div class="summary_area">
        <div class="summary_left">
          <h2 class="summary_main_title">
            <span class="large_number">3</span>分でわかる<br />
            <span class="bg_blue">アストモスグループ</span><br />
            <span class="bg_blue">物流会社</span>
          </h2>
          <a href="#" class="view_more_btn"> VIEW MORE <span class="arrow_icon">→</span> </a>
        </div>

        <div class="summary_right">
          <div class="summary_right_content">
            <p style="font-size: 1.2rem; margin-bottom: 0.5rem">年間合計走行距離</p>
            <p style="font-size: 2.5rem; font-weight: bold">地球 211周分 598輌</p>
          </div>
        </div>
      </div>
    </section>

    <!-- ===============================================
     働く環境を知る
     =============================================== -->
    <section></section>

    <!-- ===============================================
     採用情報
     =============================================== -->
    <section></section>

    <!-- ===============================================
     フッター
     =============================================== -->
    <footer></footer>
    <!-- jQuery読み込み（CDN） -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/work.js"></script>
  </body>
</html>
