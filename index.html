<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作業 アストモスグループ物流会社 採用サイト</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/work.css" />
  </head>
  <body>
    <!-- ===============================================
     ヘッダー
     =============================================== -->
    <header class="header_area">
      <div class="header_logo">
        <a href="#"><img src="img/logo_bk.png" alt="ASUTOMO GROUP" /></a>
      </div>
      <nav class="header_nav">
        <a class="header_nav_item" href="#">会社を知る</a>
        <a class="header_nav_item" href="#">人を知る</a>
        <a class="header_nav_item" href="#">働く環境を知る</a>
        <a class="header_nav_item" href="#">採用情報</a>
      </nav>
      <div class="header_buttons">
        <a class="header_button color1" href="#">募集要項</a>
        <a class="header_button color2" href="#">エントリー</a>
      </div>
    </header>

    <!-- ===============================================
     メインビジュアル
     =============================================== -->
    <!-- メインビジュアル全体（背景+テキストを重ねる） -->
    <section class="mainvisual_area">
      <!-- スライド背景コンテナ -->
      <div class="mainvisual_bg">
        <!-- スライド背景1枚（アニメーション切替用） -->
        <div class="mainvisual_slide mainvisual_slide1"></div>
        <div class="mainvisual_slide mainvisual_slide2"></div>
        <div class="mainvisual_slide mainvisual_slide3"></div>
      </div>
      <!-- テキストコンテナ -->
      <div class="mainvisual_content">
        <img class="mainvisual_title" src="img/copy_bl.svg" alt="ASUTOMO GROUP" />
        <p class="mainvisual_sub_title1 color1">明日を灯す。</p>
        <p class="mainvisual_sub_title2 color2">その情熱を燃やせ。</p>
      </div>

      <!-- タイトル上に動画を配置（PCのみ表示） -->
      <video class="mainvisual_video" autoplay muted loop playsinline>
        <source src="img/move/アストモスグループ物流会社 採用サイト.mp4" type="video/mp4" />
      </video>
    </section>

    <!-- ===============================================➂
     メッセージ
     =============================================== -->
    <section class="company_area">
      <!-- 背景（高さの基準） -->
      <div class="company_white_color">
        <div class="company_background">
          <div class="company_message">
            <p class="company_text">人々の明日を支える使命感</p>
            <p class="company_text">積み上げてきた確かな信頼</p>
            <p class="company_text">それに燃ける情熱が、明日を灯す。</p>
            <img class="company_catchcopy" src="img/top/message_txt_01.png" alt="ただの運ぶを超えていけ。届けるは明日を灯すエネルギー。" />
          </div>
        </div>
      </div>
      <div class="company_white_circle"></div>
      <!-- 白い半円装飾 -->

      <!-- 写真コンテナ（sectionに重なる） -->
      <div class="company_photos">
        <img class="company_photo_img photo1" src="img/top/message_img_01.jpg" alt="社員のイメージ" />
        <img class="company_photo_img photo2" src="img/top/message_img_02.jpg" alt="社員のイメージ" />
        <img class="company_photo_img photo3" src="img/top/message_img_03.jpg" alt="社員のイメージ" />
        <img class="company_photo_img photo4" src="img/top/message_img_04.jpg" alt="社員のイメージ" />
        <img class="company_photo_img photo5" src="img/top/message_img_05.jpg" alt="社員のイメージ" />
      </div>
    </section>

    <!-- ===============================================
     会社を知る
     =============================================== -->
    <section class="company_area">
      <h2 class="co_title"></h2>
      <span class="co_sub_title">会社を知る</span>
      <p>明日を灯す。未来を届ける。</p>

      <!-- フレックスで画像を左右に配置する -->
      <div class="company_images">
        <img src="img/btn_about_txt.png" alt="社員のイメージ" />
        <img src="img/btn_about_img.png" alt="社員のイメージ" />
      </div>
    </section>

    <!-- ===============================================
     働く環境を知る
     =============================================== -->
    <section></section>

    <!-- ===============================================
     採用情報
     =============================================== -->
    <section></section>

    <!-- ===============================================
     フッター
     =============================================== -->
    <footer></footer>
    <!-- jQuery読み込み（CDN） -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/work.js"></script>
  </body>
</html>
